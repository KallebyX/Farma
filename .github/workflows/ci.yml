name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Build needs these to be present (values don't matter — schema validates only)
      DATABASE_URL: postgresql://placeholder
      DIRECT_URL: postgresql://placeholder
      NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      EMAIL_FROM: "Farma <ci@example.com>"
      INVITE_TTL_DAYS: "7"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint --max-warnings 0

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
